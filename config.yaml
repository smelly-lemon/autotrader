trading:
  pairs:
    - BTC/USD
    - ETH/USD
    - SOL/USD
  mode: paper
  initial_balance: 100.0

schedule:
  signal_interval_seconds: 60
  candle_fetch_interval: 60
  retrain_hours: 24
  data_retention_days: 30

ml:
  target_horizon: 15          # predict 15-min forward direction
  confidence_threshold: 0.58  # P(up) > this → long, P(up) < (1 - this) → short
  position_size_pct: 0.10
  stop_loss_pct: 0.025
  take_profit_pct: 0.05
  max_holding_minutes: 120
  cv_folds: 5
  min_auc_to_trade: 0.52     # don't trade unless model shows edge in CV

risk:
  max_position_pct: 0.15
  max_open_positions: 3
  daily_drawdown_limit_pct: 0.05
  stop_loss_pct: 0.025
  max_single_trade_loss_pct: 0.02
  cooldown_after_loss_seconds: 300

exchange:
  name: coinbase
  sandbox: false
  rate_limit: true
